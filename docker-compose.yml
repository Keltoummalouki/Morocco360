services:
  postgres:
    image: postgres:16-alpine
    container_name: morocco360_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-morocco360}
      POSTGRES_PASSWORD: ${DB_PASS:-morocco360}
      POSTGRES_DB: ${DB_NAME:-morocco360}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-morocco360} -d ${DB_NAME:-morocco360}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: morocco360_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-morocco360}
      DB_PASS: ${DB_PASS:-morocco360}
      DB_NAME: ${DB_NAME:-morocco360}
      NODE_ENV: development
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access_secret_min_32_chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_secret_min_32_chars}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # Enable file polling for hot reload on Windows host
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./api/src:/app/src
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: morocco360_web
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      # Server-side calls go through the Docker network
      API_URL: http://api:4000
      # Enable file polling for hot reload on Windows host
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web/src:/app/src
      - ./web/next.config.ts:/app/next.config.ts
      - ./web/public:/app/public
      - web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
