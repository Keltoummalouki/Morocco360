name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: morocco360
          POSTGRES_PASSWORD: morocco360
          POSTGRES_DB: morocco360_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Lint
        working-directory: api
        run: npm run lint

      - name: Build
        working-directory: api
        run: npm run build

      - name: Unit tests
        working-directory: api
        run: npm run test

      - name: E2E tests
        working-directory: api
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: morocco360
          DB_PASS: morocco360
          DB_NAME: morocco360_test
          NODE_ENV: test
        run: npm run test:e2e

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build
